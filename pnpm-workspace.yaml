allowBuilds:
  '@owservable/actions': true
  '@owservable/core': true
  '@owservable/folders': true
  better-sqlite3: true
  es5-ext: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - '@owservable/core'
  - '@owservable/folders'
  - '@owservable/actions@3.1.0 || 3.1.3'
  - request@2.88.3
  - tough-cookie@4.1.3
  - form-data@2.5.4 || 2.5.6
  - qs@6.14.1
  - uuid@11.1.1
